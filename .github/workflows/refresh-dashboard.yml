name: Refresh Dashboard

on:
  schedule:
    # 5 AM UTC = 8 AM Israel time, Mon–Fri
    - cron: '0 5 * * 1-5'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and rebuild dashboard
        env:
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
        run: python refresh_dashboard.py --fetch

      - name: Commit and push updated data + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Daily data refresh [auto]"
          git push
