name: Refresh Dashboard

on:
  schedule:
    # 5 AM UTC = 8 AM Israel time, Mon–Fri
    - cron: '0 5 * * 1-5'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and rebuild dashboard
        env:
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_PASSWORD: ${{ secrets.SF_PASSWORD }}
          SF_SECURITY_TOKEN: ${{ secrets.SF_SECURITY_TOKEN }}
        run: |
          python refresh_dashboard.py --fetch 2>&1 | tee /tmp/refresh_output.txt
          exit ${PIPESTATUS[0]}

      - name: Commit and push updated data + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "Daily data refresh [auto]"
          git push

      - name: Heartbeat
        if: always()
        env:
          PROCESS_HEARTBEAT_KEY: ${{ secrets.PROCESS_HEARTBEAT_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS="ok"
            SUMMARY="CPL dashboard refreshed from Meta and Salesforce"
          else
            STATUS="error"
            ERROR_LINE=$(grep -E "Error|Exception|Failed|failed" /tmp/refresh_output.txt 2>/dev/null | tail -2 | tr '\n' ' ' | cut -c1-250)
            SUMMARY="Run failed: ${ERROR_LINE:-check GHA logs for details}"
          fi
          curl -sf -X POST "https://bina.olami.org/api/admin/processes/trig_01TrCMckUou6jhS31Lyf4w9A/heartbeat" \
            -H "Content-Type: application/json" \
            -H "x-heartbeat-key: $PROCESS_HEARTBEAT_KEY" \
            -d "$(jq -n --arg status "$STATUS" --arg summary "$SUMMARY" '{status: $status, summary: $summary}')" || true
