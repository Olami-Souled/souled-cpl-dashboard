name: Refresh Dashboard

on:
  schedule:
    # 4 AM UTC = 7 AM Israel time during IDT (UTC+3, summer), daily.
    # GitHub Actions cron is UTC-only and does not follow DST — when Israel
    # falls back to IST (UTC+2, ~late Oct–late Mar) this fires at 6 AM Israel.
    - cron: '0 4 * * *'
  workflow_dispatch: # allow manual trigger from GitHub UI

# Serialize runs: a manual "Run Now" while another run is going (or two
# clicks in quick succession) would otherwise both fetch + commit and race
# on the push to master. Queue them instead of running concurrently.
concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch data and rebuild dashboard
        env:
          WINDSOR_API_KEY: ${{ secrets.WINDSOR_API_KEY }}
          SF_USERNAME: ${{ secrets.SF_USERNAME }}
          SF_CONSUMER_KEY: ${{ secrets.SF_CONSUMER_KEY }}
          SF_PRIVATE_KEY: ${{ secrets.SF_PRIVATE_KEY }}
        run: |
          python refresh_dashboard.py --fetch 2>&1 | tee /tmp/refresh_output.txt
          exit ${PIPESTATUS[0]}

      - name: Commit and push updated data + dashboard
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && { echo "No changes to commit."; exit 0; }
          git commit -m "Daily data refresh [auto]"
          # Rebase-and-retry: if master advanced between checkout and push
          # (e.g. a concurrent run landed first), rebase our data commit on top
          # and push again instead of failing on a non-fast-forward.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "Push rejected (attempt $attempt); rebasing on latest master..."
            git pull --rebase origin master
          done
          echo "Push still failing after retries." >&2
          exit 1

      - name: Heartbeat
        if: always()
        env:
          PROCESS_HEARTBEAT_KEY: ${{ secrets.PROCESS_HEARTBEAT_KEY }}
          JOB_STATUS: ${{ job.status }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            STATUS="ok"
            SUMMARY="CPL dashboard refreshed from Meta and Salesforce"
          else
            STATUS="error"
            ERROR_LINE=$(grep -E "Error|Exception|Failed|failed" /tmp/refresh_output.txt 2>/dev/null | tail -2 | tr '\n' ' ' | cut -c1-250)
            SUMMARY="Run failed: ${ERROR_LINE:-check GHA logs for details}"
          fi
          curl -sf -X POST "https://bina.olami.org/api/admin/processes/trig_01TrCMckUou6jhS31Lyf4w9A/heartbeat" \
            -H "Content-Type: application/json" \
            -H "x-heartbeat-key: $PROCESS_HEARTBEAT_KEY" \
            -d "$(jq -n --arg status "$STATUS" --arg summary "$SUMMARY" '{status: $status, summary: $summary}')" || true
